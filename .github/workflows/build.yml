name: Build
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'codeql-analysis.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'codeql-analysis.yml'
jobs:
  build:
    name: Build and test ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        version: ["10.8.0", "9.58.0"]
    steps:
     - name: Checkout
       uses: actions/checkout@v6.0.2

     - name: Setup Node
       uses: actions/setup-node@v6.4.0
       with:
         node-version: 24

     - name: Install NPM
       run: npm install

     - name: Build
       run: npm run build

     - name: Run
       run: npm run start
       env:
         INPUT_ENVIRONMENTVARIABLENAME: TEST_SDE_PATH
         INPUT_SDEVERSION: ${{ matrix.version }}

     - name: Test
       run: npm run test TEST_SDE_PATH

  upload-binaries:
    name: Upload LFS binaries
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view binaries &>/dev/null; then
            gh release create binaries \
              --title "LFS Binaries" \
              --notes "SDE binary archives mirrored from Git LFS for stable distribution." \
              --prerelease
          fi

      - name: Upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload binaries binaries/* --clobber
